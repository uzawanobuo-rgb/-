<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eBay 写真一括補正ツール</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --surface2: #f0efe9;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --text: #1a1a18;
    --text2: #6b6b67;
    --text3: #9b9b97;
    --accent: #1a1a18;
    --accent-fg: #ffffff;
    --radius: 10px;
    --radius-sm: 6px;
    --blue-bg: #e6f1fb;
    --blue-text: #185fa5;
    --green-bg: #eaf3de;
    --green-text: #3b6d11;
    --red-bg: #fcebeb;
    --red-text: #a32d2d;
    --amber-bg: #faeeda;
    --amber-text: #854f0b;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --surface: #262624;
      --surface2: #2e2e2b;
      --border: rgba(255,255,255,0.10);
      --border2: rgba(255,255,255,0.20);
      --text: #f0efe9;
      --text2: #9b9b97;
      --text3: #6b6b67;
      --accent: #f0efe9;
      --accent-fg: #1a1a18;
      --blue-bg: #0c447c;
      --blue-text: #b5d4f4;
      --green-bg: #27500a;
      --green-text: #c0dd97;
      --red-bg: #791f1f;
      --red-text: #f7c1c1;
      --amber-bg: #633806;
      --amber-text: #fac775;
    }
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  header {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo { font-size: 15px; font-weight: 500; letter-spacing: -0.01em; }
  .logo span { color: var(--text2); font-weight: 400; }

  .api-key-wrap { display: flex; align-items: center; gap: 8px; }
  .api-key-wrap label { font-size: 12px; color: var(--text2); }
  .api-key-wrap input {
    font-size: 12px;
    padding: 6px 10px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--surface2);
    color: var(--text);
    width: 240px;
  }
  .api-key-wrap input::placeholder { color: var(--text3); }

  main { max-width: 960px; margin: 0 auto; padding: 32px 24px 64px; }

  .drop-zone {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 48px 24px;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s;
    background: var(--surface);
  }
  .drop-zone:hover, .drop-zone.drag-over {
    background: var(--surface2);
  }
  .drop-icon {
    width: 48px; height: 48px;
    border: 1.5px solid var(--border2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
  }
  .drop-title { font-size: 16px; font-weight: 500; margin-bottom: 4px; }
  .drop-sub { font-size: 13px; color: var(--text2); margin-bottom: 16px; }
  .drop-hint { font-size: 12px; color: var(--text3); margin-top: 12px; }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 20px;
    border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    border: 0.5px solid var(--border2);
    background: transparent;
    color: var(--text);
  }
  .btn:hover { background: var(--surface2); }
  .btn:active { transform: scale(0.98); }
  .btn-primary {
    background: var(--accent);
    color: var(--accent-fg);
    border-color: var(--accent);
  }
  .btn-primary:hover { opacity: 0.85; background: var(--accent); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

  .toolbar {
    display: none;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 24px;
    padding: 14px 16px;
    background: var(--surface);
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
  }
  .toolbar-left { font-size: 13px; color: var(--text2); }
  .toolbar-right { display: flex; gap: 8px; }

  .progress-wrap {
    display: none;
    margin-top: 12px;
    background: var(--surface2);
    border-radius: 4px;
    height: 4px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 4px;
    transition: width 0.3s ease;
  }

  .photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
    margin-top: 20px;
  }

  .photo-card {
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    overflow: hidden;
    background: var(--surface);
  }
  .photo-card img {
    width: 100%; height: 148px;
    object-fit: cover; display: block;
  }
  .card-body { padding: 10px 12px 12px; }
  .card-name {
    font-size: 11px; color: var(--text2);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    margin-bottom: 6px;
  }
  .badge {
    display: inline-block; font-size: 11px;
    padding: 2px 8px; border-radius: 20px;
  }
  .badge-wait { background: var(--surface2); color: var(--text2); }
  .badge-proc { background: var(--blue-bg); color: var(--blue-text); }
  .badge-done { background: var(--green-bg); color: var(--green-text); }
  .badge-err  { background: var(--red-bg);  color: var(--red-text);  }

  .card-adj {
    font-size: 10px; color: var(--text3);
    margin-top: 5px; line-height: 1.5;
  }

  .dl-btn {
    display: none; width: 100%; margin-top: 8px;
    font-size: 12px; padding: 6px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    background: transparent; color: var(--text);
    cursor: pointer; text-align: center;
  }
  .dl-btn:hover { background: var(--surface2); }

  .dl-all-wrap {
    display: none;
    margin-top: 24px;
    padding: 16px;
    background: var(--green-bg);
    border-radius: var(--radius);
    text-align: center;
  }
  .dl-all-wrap p { font-size: 13px; color: var(--green-text); margin-bottom: 12px; }

  .summary-note {
    font-size: 11px; color: var(--text3);
    margin-top: 4px; font-style: italic;
  }

  footer {
    text-align: center;
    font-size: 11px;
    color: var(--text3);
    padding: 24px;
    border-top: 0.5px solid var(--border);
    margin-top: 40px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">eBay 写真補正 <span>/ AI一括処理</span></div>
  <div class="api-key-wrap">
    <label for="apiKey">Anthropic APIキー</label>
    <input type="password" id="apiKey" placeholder="sk-ant-..." autocomplete="off">
  </div>
</header>

<main>
  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">
      <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
    </div>
    <p class="drop-title">写真をここにドロップ</p>
    <p class="drop-sub">または</p>
    <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">ファイルを選択</button>
    <p class="drop-hint">JPG・PNG・HEIC など複数選択可</p>
  </div>
  <input type="file" id="fileInput" accept="image/*" multiple style="display:none">

  <div class="toolbar" id="toolbar">
    <div class="toolbar-left" id="countLabel"></div>
    <div class="toolbar-right">
      <button class="btn" onclick="clearAll()">クリア</button>
      <button class="btn btn-primary" id="runBtn" onclick="runAll()">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        AIで一括補正する
      </button>
    </div>
  </div>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>

  <div class="photo-grid" id="photoGrid"></div>

  <div class="dl-all-wrap" id="dlAllWrap">
    <p>すべての補正が完了しました</p>
    <button class="btn btn-primary" onclick="downloadAll()">全ファイルをまとめてダウンロード</button>
    <p class="summary-note">1枚ずつ順番にダウンロードされます</p>
  </div>
</main>

<footer>
  写真はAI分析のためAnthropicのAPIに送信されます。画像処理はブラウザ内で完結します。
</footer>

<script>
const state = { files: [] };

const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const photoGrid = document.getElementById('photoGrid');
const toolbar = document.getElementById('toolbar');
const countLabel = document.getElementById('countLabel');
const runBtn = document.getElementById('runBtn');
const progressWrap = document.getElementById('progressWrap');
const progressBar = document.getElementById('progressBar');
const dlAllWrap = document.getElementById('dlAllWrap');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); addFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', e => addFiles(e.target.files));

function addFiles(fileList) {
  for (const f of fileList) {
    if (!f.type.startsWith('image/')) continue;
    const idx = state.files.length;
    state.files.push({ file: f, status: 'wait', blob: null, adjustments: null });
    renderCard(f, idx);
  }
  updateUI();
}

function renderCard(file, idx) {
  const card = document.createElement('div');
  card.className = 'photo-card';
  card.id = 'card-' + idx;
  const url = URL.createObjectURL(file);
  card.innerHTML = `
    <img id="img-${idx}" src="${url}">
    <div class="card-body">
      <div class="card-name" title="${file.name}">${file.name}</div>
      <span class="badge badge-wait" id="badge-${idx}">待機中</span>
      <div class="card-adj" id="adj-${idx}"></div>
      <button class="dl-btn" id="dl-${idx}" onclick="downloadOne(${idx})">↓ ダウンロード</button>
    </div>`;
  photoGrid.appendChild(card);
}

function updateUI() {
  const n = state.files.length;
  toolbar.style.display = n ? 'flex' : 'none';
  countLabel.textContent = `${n}枚の写真を読み込み済み`;
  runBtn.disabled = n === 0;
  dlAllWrap.style.display = 'none';
}

function clearAll() {
  state.files = [];
  photoGrid.innerHTML = '';
  fileInput.value = '';
  progressWrap.style.display = 'none';
  progressBar.style.width = '0%';
  dlAllWrap.style.display = 'none';
  updateUI();
}

async function runAll() {
  const apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) { alert('Anthropic APIキーを入力してください'); return; }

  runBtn.disabled = true;
  progressWrap.style.display = 'block';
  dlAllWrap.style.display = 'none';

  const total = state.files.length;
  let doneCount = 0;

  for (let i = 0; i < total; i++) {
    if (state.files[i].status === 'done') { doneCount++; continue; }
    setBadge(i, 'proc', '処理中...');
    document.getElementById('adj-' + i).textContent = '';
    await processImage(i, apiKey);
    doneCount++;
    progressBar.style.width = Math.round(doneCount / total * 100) + '%';
  }

  runBtn.disabled = false;
  const allDone = state.files.every(f => f.status === 'done');
  if (allDone) dlAllWrap.style.display = 'block';
}

async function processImage(idx, apiKey) {
  const { file } = state.files[idx];
  const imgEl = document.getElementById('img-' + idx);
  try {
    const b64 = await toBase64(file);
    const mediaType = file.type === 'image/png' ? 'image/png' : 'image/jpeg';
    const adj = await getAIAdjustments(b64, mediaType, apiKey);
    state.files[idx].adjustments = adj;

    const blob = await applyAdjustments(imgEl.src, adj);
    state.files[idx].blob = blob;
    state.files[idx].status = 'done';

    imgEl.src = URL.createObjectURL(blob);
    setBadge(idx, 'done', '補正完了');

    if (adj.reasoning) {
      document.getElementById('adj-' + idx).textContent = adj.reasoning;
    }

    document.getElementById('dl-' + idx).style.display = 'block';
  } catch(e) {
    state.files[idx].status = 'err';
    setBadge(idx, 'err', 'エラー');
    document.getElementById('adj-' + idx).textContent = e.message || '処理に失敗しました';
    console.error(e);
  }
}

function toBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function getAIAdjustments(b64, mediaType, apiKey) {
  const resp = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 512,
      messages: [{
        role: 'user',
        content: [{
          type: 'image',
          source: { type: 'base64', media_type: mediaType, data: b64 }
        }, {
          type: 'text',
          text: `あなたはeBay出品写真の専門編集者です。この商品写真を分析し、プロらしく明るく鮮明に見えるよう補正値をJSON形式のみで返してください。前置きやマークダウンは不要です。

以下のJSON形式で返してください:
{
  "brightness": <数値 -100〜100>,
  "contrast": <数値 -100〜100>,
  "saturation": <数値 -100〜100>,
  "highlights": <数値 -100〜100>,
  "shadows": <数値 -100〜100>,
  "whitePoint": <数値 -100〜100>,
  "blackPoint": <数値 -100〜100>,
  "reasoning": "<補正の理由を日本語で一言>"
}

目標: 商品がはっきり見える、背景が邪魔しない、色が正確、eBayのプロ出品写真らしい仕上がり`
        }]
      }]
    })
  });

  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(err?.error?.message || `API Error: ${resp.status}`);
  }

  const data = await resp.json();
  const text = data.content.map(c => c.text || '').join('');
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

function applyAdjustments(src, adj) {
  return new Promise((res, rej) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);

      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const d = imageData.data;

      const br = (adj.brightness || 0) / 100;
      const co = (adj.contrast   || 0) / 100 + 1;
      const sat = (adj.saturation || 0) / 100 + 1;
      const hl = (adj.highlights  || 0) / 200;
      const sh = (adj.shadows     || 0) / 200;
      const wp = (adj.whitePoint  || 0) / 200;
      const bp = (adj.blackPoint  || 0) / 200;

      for (let i = 0; i < d.length; i += 4) {
        let r = d[i]   / 255;
        let g = d[i+1] / 255;
        let b = d[i+2] / 255;

        r += br; g += br; b += br;
        r = (r - 0.5) * co + 0.5;
        g = (g - 0.5) * co + 0.5;
        b = (b - 0.5) * co + 0.5;

        const gray = 0.299 * r + 0.587 * g + 0.114 * b;
        r = gray + sat * (r - gray);
        g = gray + sat * (g - gray);
        b = gray + sat * (b - gray);

        const lum = (r + g + b) / 3;
        if (lum > 0.5) {
          r += hl + wp; g += hl + wp; b += hl + wp;
        } else {
          r += sh + bp; g += sh + bp; b += sh + bp;
        }

        d[i]   = Math.min(255, Math.max(0, Math.round(r * 255)));
        d[i+1] = Math.min(255, Math.max(0, Math.round(g * 255)));
        d[i+2] = Math.min(255, Math.max(0, Math.round(b * 255)));
      }

      ctx.putImageData(imageData, 0, 0);
      canvas.toBlob(blob => blob ? res(blob) : rej(new Error('blob生成失敗')), 'image/jpeg', 0.92);
    };
    img.onerror = () => rej(new Error('画像の読み込みに失敗'));
    img.src = src;
  });
}

function downloadOne(idx) {
  const { blob, file } = state.files[idx];
  if (!blob) return;
  const a = document.createElement('a');
  const base = file.name.replace(/\.[^.]+$/, '');
  a.href = URL.createObjectURL(blob);
  a.download = base + '_enhanced.jpg';
  a.click();
}

async function downloadAll() {
  for (let i = 0; i < state.files.length; i++) {
    if (state.files[i].status !== 'done') continue;
    downloadOne(i);
    await new Promise(r => setTimeout(r, 400));
  }
}

function setBadge(idx, cls, label) {
  const b = document.getElementById('badge-' + idx);
  b.className = 'badge badge-' + cls;
  b.textContent = label;
}
</script>
</body>
</html>
