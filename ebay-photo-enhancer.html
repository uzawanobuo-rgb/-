<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eBay 写真一括補正ツール</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--border:rgba(0,0,0,.12);--border2:rgba(0,0,0,.22);--text:#1a1a18;--text2:#6b6b67;--text3:#9b9b97;--accent:#1a1a18;--accent-fg:#fff;--radius:10px;--radius-sm:6px;--blue-bg:#e6f1fb;--blue-text:#185fa5;--green-bg:#eaf3de;--green-text:#3b6d11;--red-bg:#fcebeb;--red-text:#a32d2d}
@media(prefers-color-scheme:dark){:root{--bg:#1c1c1a;--surface:#262624;--surface2:#2e2e2b;--border:rgba(255,255,255,.10);--border2:rgba(255,255,255,.20);--text:#f0efe9;--text2:#9b9b97;--text3:#6b6b67;--accent:#f0efe9;--accent-fg:#1a1a18;--blue-bg:#0c447c;--blue-text:#b5d4f4;--green-bg:#27500a;--green-text:#c0dd97;--red-bg:#791f1f;--red-text:#f7c1c1}}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
header{background:var(--surface);border-bottom:.5px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo{font-size:15px;font-weight:500}.logo span{color:var(--text2);font-weight:400}
.back-link{font-size:12px;color:var(--text2);text-decoration:none}.back-link:hover{color:var(--text)}
main{max-width:1000px;margin:0 auto;padding:32px 24px 80px}
.adj-panel{background:var(--surface);border:.5px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:24px}
.adj-panel h2{font-size:14px;font-weight:500;margin-bottom:16px}
.adj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px 24px}
.adj-row{display:flex;align-items:center;gap:10px}
.adj-row label{font-size:12px;color:var(--text2);width:100px;flex-shrink:0}
.adj-row input[type=range]{flex:1}
.adj-row span{font-size:12px;font-weight:500;width:32px;text-align:right}
.drop-zone{border:1.5px dashed var(--border2);border-radius:var(--radius);padding:48px 24px;text-align:center;cursor:pointer;transition:background .15s;background:var(--surface)}
.drop-zone:hover,.drop-zone.drag-over{background:var(--surface2)}
.drop-icon{width:48px;height:48px;border:1.5px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:var(--text2)}
.drop-title{font-size:16px;font-weight:500;margin-bottom:4px}.drop-sub{font-size:13px;color:var(--text2);margin-bottom:16px}.drop-hint{font-size:12px;color:var(--text3);margin-top:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s,transform .1s;border:.5px solid var(--border2);background:transparent;color:var(--text)}
.btn:hover{background:var(--surface2)}.btn:active{transform:scale(.98)}
.btn-primary{background:var(--accent);color:var(--accent-fg);border-color:transparent}.btn-primary:hover{opacity:.85;background:var(--accent)}.btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.toolbar{display:none;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-top:20px;padding:12px 16px;background:var(--surface);border-radius:var(--radius);border:.5px solid var(--border)}
.toolbar-left{font-size:13px;color:var(--text2)}.toolbar-right{display:flex;gap:8px}
.progress-wrap{display:none;margin-top:10px;background:var(--surface2);border-radius:4px;height:4px;overflow:hidden}
.progress-bar{height:100%;background:var(--accent);border-radius:4px;transition:width .3s ease}
.progress-label{font-size:12px;color:var(--text2);margin-top:6px;text-align:right}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(176px,1fr));gap:12px;margin-top:20px}
.photo-card{border-radius:var(--radius);border:.5px solid var(--border);overflow:hidden;background:var(--surface);transition:border-color .2s}.photo-card.done{border-color:#3b6d11}
.photo-card img{width:100%;height:148px;object-fit:cover;display:block;background:var(--surface2)}
.card-body{padding:10px 12px 12px}.card-name{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:6px}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px}
.badge-wait{background:var(--surface2);color:var(--text2)}.badge-proc{background:var(--blue-bg);color:var(--blue-text)}.badge-done{background:var(--green-bg);color:var(--green-text)}.badge-err{background:var(--red-bg);color:var(--red-text)}
.dl-btn{display:none;width:100%;margin-top:8px;font-size:12px;padding:6px;border:.5px solid var(--border2);border-radius:var(--radius-sm);background:transparent;color:var(--text);cursor:pointer;text-align:center}.dl-btn:hover{background:var(--surface2)}
.finish-bar{display:none;margin-top:24px;padding:16px 20px;background:var(--green-bg);border-radius:var(--radius);align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.finish-bar p{font-size:13px;color:var(--green-text);margin:0}
footer{text-align:center;font-size:11px;color:var(--text3);padding:24px;border-top:.5px solid var(--border);margin-top:48px}
</style>
</head>
<body>
<header>
<div class="logo">eBay 写真補正ツール <span>/ 一括処理</span></div>
<a class="back-link" href="./ebay_banner_tool.html">← バナー合成ツールへ</a>
</header>
<main>
<div class="adj-panel">
<h2>補正設定（スライダーで微調整できます）</h2>
<div class="adj-grid">
<div class="adj-row"><label>明るさ</label><input type="range" min="-100" max="100" value="15" id="s-brightness" oninput="document.getElementById('v-brightness').textContent=this.value"><span id="v-brightness">15</span></div>
<div class="adj-row"><label>コントラスト</label><input type="range" min="-100" max="100" value="12" id="s-contrast" oninput="document.getElementById('v-contrast').textContent=this.value"><span id="v-contrast">12</span></div>
<div class="adj-row"><label>彩度</label><input type="range" min="-100" max="100" value="5" id="s-saturation" oninput="document.getElementById('v-saturation').textContent=this.value"><span id="v-saturation">5</span></div>
<div class="adj-row"><label>ハイライト</label><input type="range" min="-100" max="100" value="12" id="s-highlights" oninput="document.getElementById('v-highlights').textContent=this.value"><span id="v-highlights">12</span></div>
<div class="adj-row"><label>シャドウ</label><input type="range" min="-100" max="100" value="-65" id="s-shadows" oninput="document.getElementById('v-shadows').textContent=this.value"><span id="v-shadows">-65</span></div>
<div class="adj-row"><label>ホワイトポイント</label><input type="range" min="-100" max="100" value="3" id="s-whitePoint" oninput="document.getElementById('v-whitePoint').textContent=this.value"><span id="v-whitePoint">3</span></div>
<div class="adj-row"><label>ブラックポイント</label><input type="range" min="-100" max="100" value="12" id="s-blackPoint" oninput="document.getElementById('v-blackPoint').textContent=this.value"><span id="v-blackPoint">12</span></div>
</div>
</div>
<div class="drop-zone" id="dropZone">
<div class="drop-icon"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
<p class="drop-title">写真をここにドロップ</p><p class="drop-sub">または</p>
<button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">ファイルを選択</button>
<p class="drop-hint">JPG・PNG 複数選択可</p>
</div>
<input type="file" id="fileInput" accept="image/*" multiple style="display:none">
<div class="toolbar" id="toolbar">
<div class="toolbar-left" id="countLabel"></div>
<div class="toolbar-right">
<button class="btn" onclick="clearAll()">クリア</button>
<button class="btn btn-primary" id="runBtn" onclick="runAll()"><svg width="13" height="13" fill="currentColor" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>一括補正する</button>
</div>
</div>
<div class="progress-wrap" id="progressWrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
<div class="progress-label" id="progressLabel" style="display:none"></div>
<div class="photo-grid" id="photoGrid"></div>
<div class="finish-bar" id="finishBar">
<p>すべての補正が完了しました</p>
<button class="btn btn-primary" onclick="downloadAll()"><svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>全ファイルをダウンロード</button>
</div>
</main>
<footer>画像処理はすべてブラウザ内で完結します。写真がサーバーに送られることはありません。</footer>
<script>
const state={files:[]};
const dropZone=document.getElementById('dropZone'),fileInput=document.getElementById('fileInput'),photoGrid=document.getElementById('photoGrid'),toolbar=document.getElementById('toolbar'),countLabel=document.getElementById('countLabel'),runBtn=document.getElementById('runBtn'),progressWrap=document.getElementById('progressWrap'),progressBar=document.getElementById('progressBar'),progressLabel=document.getElementById('progressLabel'),finishBar=document.getElementById('finishBar');
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag-over');});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag-over');addFiles(e.dataTransfer.files);});
fileInput.addEventListener('change',e=>{addFiles(e.target.files);e.target.value='';});
function getAdj(){return{brightness:+document.getElementById('s-brightness').value,contrast:+document.getElementById('s-contrast').value,saturation:+document.getElementById('s-saturation').value,highlights:+document.getElementById('s-highlights').value,shadows:+document.getElementById('s-shadows').value,whitePoint:+document.getElementById('s-whitePoint').value,blackPoint:+document.getElementById('s-blackPoint').value};}
function addFiles(fl){for(const f of fl){if(!f.type.startsWith('image/'))continue;const i=state.files.length;state.files.push({file:f,status:'wait',blob:null});renderCard(f,i);}updateUI();}
function renderCard(f,i){const c=document.createElement('div');c.className='photo-card';c.id='card-'+i;c.innerHTML='<img id="img-'+i+'" src="'+URL.createObjectURL(f)+'"><div class="card-body"><div class="card-name" title="'+f.name+'">'+f.name+'</div><span class="badge badge-wait" id="badge-'+i+'">待機中</span><button class="dl-btn" id="dl-'+i+'" onclick="downloadOne('+i+')">↓ ダウンロード</button></div>';photoGrid.appendChild(c);}
function updateUI(){const n=state.files.length;toolbar.style.display=n?'flex':'none';countLabel.textContent=n+'枚の写真';runBtn.disabled=n===0;finishBar.style.display='none';}
function clearAll(){state.files=[];photoGrid.innerHTML='';progressWrap.style.display='none';progressLabel.style.display='none';progressBar.style.width='0%';finishBar.style.display='none';updateUI();}
async function runAll(){runBtn.disabled=true;progressWrap.style.display='block';progressLabel.style.display='block';finishBar.style.display='none';const total=state.files.length,adj=getAdj();let done=0;for(let i=0;i<total;i++){if(state.files[i].status==='done'){done++;continue;}setBadge(i,'proc','処理中...');await processImage(i,adj);done++;progressBar.style.width=Math.round(done/total*100)+'%';progressLabel.textContent=done+' / '+total+' 完了';}runBtn.disabled=false;if(state.files.every(f=>f.status==='done'))finishBar.style.display='flex';}
async function processImage(i,adj){const el=document.getElementById('img-'+i);try{const blob=await applyAdj(el.src,adj);state.files[i].blob=blob;state.files[i].status='done';el.src=URL.createObjectURL(blob);document.getElementById('card-'+i).classList.add('done');setBadge(i,'done','補正完了');document.getElementById('dl-'+i).style.display='block';}catch(e){state.files[i].status='err';setBadge(i,'err','エラー');}}
function applyAdj(src,adj){return new Promise((res,rej)=>{const img=new Image();img.crossOrigin='anonymous';img.onload=()=>{const cv=document.createElement('canvas');cv.width=img.naturalWidth;cv.height=img.naturalHeight;const ctx=cv.getContext('2d');ctx.drawImage(img,0,0);const id=ctx.getImageData(0,0,cv.width,cv.height),d=id.data;const br=(adj.brightness||0)/100,co=(adj.contrast||0)/100+1,sat=(adj.saturation||0)/100+1,hl=(adj.highlights||0)/200,sh=(adj.shadows||0)/200,wp=(adj.whitePoint||0)/200,bp=(adj.blackPoint||0)/200;for(let i=0;i<d.length;i+=4){let r=d[i]/255,g=d[i+1]/255,b=d[i+2]/255;r+=br;g+=br;b+=br;r=(r-.5)*co+.5;g=(g-.5)*co+.5;b=(b-.5)*co+.5;const gr=.299*r+.587*g+.114*b;r=gr+sat*(r-gr);g=gr+sat*(g-gr);b=gr+sat*(b-gr);const lum=(r+g+b)/3,add=lum>.5?hl+wp:sh+bp;r+=add;g+=add;b+=add;d[i]=Math.min(255,Math.max(0,Math.round(r*255)));d[i+1]=Math.min(255,Math.max(0,Math.round(g*255)));d[i+2]=Math.min(255,Math.max(0,Math.round(b*255)));}ctx.putImageData(id,0,0);cv.toBlob(blob=>blob?res(blob):rej(new Error('失敗')),'image/jpeg',.92);};img.onerror=()=>rej(new Error('失敗'));img.src=src;});}
function downloadOne(i){const{blob,file}=state.files[i];if(!blob)return;const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=file.name.replace(/.[^.]+$/,'')+'_enhanced.jpg';a.click();}
async function downloadAll(){for(let i=0;i<state.files.length;i++){if(state.files[i].status!=='done')continue;downloadOne(i);await new Promise(r=>setTimeout(r,500));}}
function setBadge(i,cls,label){const b=document.getElementById('badge-'+i);b.className='badge badge-'+cls;b.textContent=label;}
</script>
</body>
</html>
